<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    height: 100%;
    height: 100dvh;
    font-family: 'Lora', serif;
    background: #f4f9f9;
    color: #455a64;
    overflow: hidden;
}
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 20px;
}
#names {
    font-family: 'Great Vibes', cursive;
    font-size: 2.4rem;
    color: #4db6ac;
    margin-bottom: 10px;
    text-align: center;
    transition: opacity 0.5s ease;
}
#divider {
    width: 54px;
    height: 1px;
    background: #c9a961;
    margin: 0 auto 26px;
    transition: opacity 0.5s ease;
}
#scene {
    position: relative;
    width: min(94vw, 420px);
    aspect-ratio: 1.9 / 1;
    transform: perspective(900px) rotateX(4deg);
    transition: opacity 0.6s ease, transform 0.6s ease;
}
#envelope { position: absolute; inset: 0; cursor: pointer; }
#env-body-svg { position: absolute; inset: 0; width: 100%; height: 100%; filter: drop-shadow(0 20px 26px rgba(0,0,0,0.25)); }
#flap {
    position: absolute; top: 0; left: 0; width: 100%; height: 42%;
    transform-origin: top;
    transition: transform 0.8s ease;
    filter: drop-shadow(0 8px 10px rgba(0,0,0,0.22));
    z-index: 5;
}
#flap svg { width: 100%; height: 100%; display: block; }
#seal {
    position: absolute; top: 11%; left: 50%; transform: translateX(-50%);
    width: 78px; height: 78px; border-radius: 50%;
    background: #ffffff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 3px #ffffff, 0 8px 18px rgba(0,0,0,0.25);
    border: 2px solid #80cbc4;
    overflow: hidden;
    z-index: 6;
}
#seal img { position: absolute; top: 50%; left: 50%; width: 132%; height: 132%; transform: translate(-50%, -50%); object-fit: cover; }
#hint {
    font-size: 14px;
    color: #78909c;
    text-align: center;
    max-width: 280px;
    margin-top: 28px;
    min-height: 20px;
    transition: opacity 0.4s ease;
}
#card3d {
    position: fixed;
    top: 50%;
    left: 50%;
    width: min(94vw, 66vh, 480px);
    aspect-ratio: 900 / 1217;
    transform: translate(-50%, -50%) scale(0.92) rotateY(0deg);
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.8s ease;
    opacity: 0;
    z-index: 20;
    cursor: grab;
    touch-action: none;
    pointer-events: none;
}
#card3d.dragging { cursor: grabbing; }
#card-teaser {
    position: fixed;
    top: 50%;
    left: 50%;
    width: min(94vw, 66vh, 480px);
    aspect-ratio: 900 / 620;
    transform: translate(-50%, -15%) scale(0.32);
    opacity: 0;
    z-index: 19;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 16px rgba(0,0,0,0.18), 0 30px 60px rgba(0,0,0,0.3);
    background: white;
    transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.7s ease;
    pointer-events: none;
}
#card-teaser img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-face {
    position: absolute; inset: 0;
    border-radius: 8px;
    overflow: hidden;
    backface-visibility: hidden;
    box-shadow: 0 8px 16px rgba(0,0,0,0.18), 0 30px 60px rgba(0,0,0,0.3);
    background: white;
}
.card-face img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
#back-face { transform: rotateY(180deg); }
#enter-cta {
    position: fixed;
    left: 50%;
    bottom: 8%;
    transform: translateX(-50%) translateY(10px);
    opacity: 0;
    z-index: 21;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.6s ease, transform 0.6s ease;
}
#enter-cta a {
    display: inline-block;
    font-family: 'Lora', serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #4db6ac;
    text-decoration: none;
    padding-bottom: 4px;
    border-bottom: 1px solid #80cbc4;
    transition: color 0.3s ease, border-color 0.3s ease;
}
#enter-cta a:hover { color: #2f7d76; border-color: #2f7d76; }
.visible { opacity: 1 !important; pointer-events: auto !important; transform: translateX(-50%) translateY(0) !important; }

<div id="enter-cta"><a href="#" id="enter-link">Entra nel nostro sito</a></div>

<script>
const envelope = document.getElementById('envelope');
const flap = document.getElementById('flap');
const scene = document.getElementById('scene');
const card = document.getElementById('card3d');
const teaser = document.getElementById('card-teaser');
const hint = document.getElementById('hint');
const namesEl = document.getElementById('names');
const dividerEl = document.getElementById('divider');
const cta = document.getElementById('enter-cta');
const enterLink = document.getElementById('enter-link');
const SITE_URL = 'https://umbertolarocca.github.io/Matrimonio/';
enterLink.href = SITE_URL;

let opened = false;
let restRotation = 0;
let zoom = 1;
const ZOOM_MIN = 1, ZOOM_MAX = 2.3;

let isPointerDown = false;
let dragStartX = 0;
let activePointers = new Set();
let pinching = false;
let pinchStartDist = 0;
let pinchStartZoom = 1;

function updateTransform(smooth) {
    card.style.transition = smooth
        ? 'transform 0.6s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.6s ease'
        : 'opacity 0.6s ease';
    card.style.opacity = '1';
    card.style.transform = `translate(-50%, -50%) scale(${zoom}) rotateY(${restRotation}deg)`;
}

envelope.addEventListener('click', () => {
    if (opened) return;
    opened = true;

    // 1. Leggero zoom sulla busta mentre la linguetta si alza
    scene.style.transform = 'perspective(900px) rotateX(4deg) scale(1.1)';
    flap.style.transform = 'rotateX(-170deg)';

    // 2. Il "teaser" piegato (pittogramma sposi) esce lentamente dalla busta
    setTimeout(() => {
        teaser.style.opacity = '1';
        teaser.style.transform = 'translate(-50%, -50%) scale(0.6)';
    }, 550);

    // 3. La busta sfuma sullo sfondo
    setTimeout(() => {
        scene.style.opacity = '0';
        namesEl.style.opacity = '0';
        dividerEl.style.opacity = '0';
    }, 1000);

    // 4. Il teaser sfuma e la card intera (fronte) prende il suo posto, ingrandendosi
    setTimeout(() => {
        teaser.style.opacity = '0';
        card.style.opacity = '1';
        card.style.pointerEvents = 'auto';
        updateTransform(false);
    }, 2000);

    setTimeout(() => {
        hint.textContent = 'Scorri per girare la card, pizzica per ingrandire';
        hint.style.opacity = '1';
        cta.classList.add('visible');
    }, 2900);
});

// --- Trascinamento: ogni swipe ruota la card di 180°, mai a metà ---
card.addEventListener('pointerdown', (e) => {
    if (!opened) return;
    activePointers.add(e.pointerId);
    card.setPointerCapture(e.pointerId);
    if (activePointers.size === 1) {
        isPointerDown = true;
        dragStartX = e.clientX;
        card.classList.add('dragging');
    } else {
        isPointerDown = false;
    }
});

function finishDrag(e) {
    activePointers.delete(e.pointerId);
    card.classList.remove('dragging');
    if (!isPointerDown || pinching) { isPointerDown = false; return; }
    isPointerDown = false;
    const delta = e.clientX - dragStartX;
    if (Math.abs(delta) > 8) {
        restRotation += delta > 0 ? 180 : -180;
        updateTransform(true);
    }
}
card.addEventListener('pointerup', finishDrag);
card.addEventListener('pointercancel', finishDrag);

// --- Zoom: pizzico a due dita su mobile ---
function touchDist(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.hypot(dx, dy);
}

card.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
        pinching = true;
        isPointerDown = false;
        pinchStartDist = touchDist(e.touches);
        pinchStartZoom = zoom;
    }
}, { passive: true });

card.addEventListener('touchmove', (e) => {
    if (pinching && e.touches.length === 2) {
        const dist = touchDist(e.touches);
        zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, pinchStartZoom * (dist / pinchStartDist)));
        updateTransform(false);
    }
}, { passive: true });

card.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) pinching = false;
}, { passive: true });

// --- Zoom: rotellina del mouse su PC ---
card.addEventListener('wheel', (e) => {
    if (!opened) return;
    e.preventDefault();
    zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoom - e.deltaY * 0.0015));
    updateTransform(false);
}, { passive: false });

// --- Doppio click / doppio tap: azzera lo zoom ---
card.addEventListener('dblclick', () => {
    zoom = 1;
    updateTransform(true);
});
</script>
